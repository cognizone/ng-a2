<div class="action-row">
  <mat-form-field appearance="outline">
    <mat-label>File path</mat-label>
    <input matInput [(ngModel)]="currentPath" placeholder="Enter file path">
  </mat-form-field>

  <button mat-raised-button color="primary" class="action-button" type="submit"
          (click)="get(this.currentPath)">
    GO
  </button>
  <button mat-raised-button color="accent" class="action-button" type="submit"
          [disabled]="previousPaths.length === 0"
          (click)="back()">
    BACK
  </button>
</div>

<div class="spacer"></div>

<p>Download tail of file (lines)</p>
<div class="tail-container">
  <mat-checkbox
      class="tail-input"
      type="checkbox"
      [(ngModel)]="tailEnabled"
      title="{{ tailEnabled ? 'Disable line limit' : 'Enable line limit' }}">
  </mat-checkbox>

  <mat-form-field appearance="outline" class="tail-input">
    <mat-label>Last n many lines</mat-label>
    <input matInput [disabled]="!tailEnabled" [(ngModel)]="tailLines" placeholder="Enter a number">
  </mat-form-field>
</div>

<div class="spacer"></div>

<div *ngIf="dir">
  <p *ngFor="let d of dir.dirs"><a (click)="expand(d)">{{d}}/</a></p>
  <p *ngFor="let f of dir.files">
    <a class="file" title="Download"
       target="_blank"
       rel="noopener noreferrer"
       [href]="getLink(f.name)">{{f.name}}
    </a>
    ({{f.size}})
  </p>
</div>

<div class="my-modal-panel">
  <div *ngIf="data.header" class="my-modal-header">{{ data.header }}</div>
  <p *ngIf="data.text">{{ data.text }}</p>
  <div class="my-button-container">
    <button mat-raised-button color="primary" class="my-action-button" [mat-dialog-close]="true">{{ data.execute }}</button>
    <button mat-raised-button class="my-action-button" mat-dialog-close>{{ data.cancel }}</button>
  </div>
</div>

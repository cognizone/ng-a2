<div class="modal-panel">
  <div *ngIf="data.header" class="modal-header">{{ data.header }}</div>
  <p *ngIf="data.text">{{ data.text }}</p>
  <div class="button-container">
    <button mat-raised-button color="primary" class="action-button" [mat-dialog-close]="true">{{ data.execute }}</button>
    <button mat-flat-button color="warn" class="action-button" mat-dialog-close>{{ data.cancel }}</button>
  </div>
</div>
